<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App — EcoViewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
  <style>
    body { overflow: hidden; }

    .app-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      display: flex;
      align-items: center;
      padding: 0 2rem;
      gap: 2rem;
      z-index: 100;
      background: rgba(247, 246, 242, 0.96);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border2);
      box-shadow: var(--shadow-sm);
    }
    .app-nav .nav-logo {
      font-family: var(--serif);
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      flex-shrink: 0;
    }
    .app-nav .nav-logo span { color: var(--green); }

    .app-nav-links {
      display: flex;
      list-style: none;
      gap: 2rem;
      margin-left: auto;
    }
    .app-nav-links a {
      font-family: var(--sans);
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--text2);
      text-decoration: none;
      transition: color 0.2s;
    }
    .app-nav-links a:hover { color: var(--green); }
    .app-nav-links a.active { color: var(--green); }

    .app-nav-open {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--text3);
      text-decoration: none;
      letter-spacing: 0.08em;
      flex-shrink: 0;
      transition: color 0.2s;
    }
    .app-nav-open:hover { color: var(--green); }

    .app-frame {
      position: fixed;
      top: var(--nav-h);
      left: 0; right: 0; bottom: 0;
    }
    .app-frame iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    @media (max-width: 768px) {
      .app-nav-links { display: none; }
      .app-nav-open { margin-left: auto; }
    }
  </style>
</head>
<body>

  <nav class="app-nav">
    <a href="../" class="nav-logo">Eco<span>Viewer</span></a>
    <ul class="app-nav-links">
      <li><a href="../">Home</a></li>
      <li><a href="../about/">About</a></li>
      <li><a href="../resources/">Resources</a></li>
      <li><a href="../tutorials/">Tutorials</a></li>
      <li><a href="../app/" class="active">App</a></li>
    </ul>
    <a href="https://geo-global-ecosystems-atlas.projects.earthengine.app/view/ecoviewer"
       target="_blank" rel="noopener" class="app-nav-open">Open in Earth Engine ↗</a>
  </nav>

  <div class="app-frame">
    <iframe
      src="https://geo-global-ecosystems-atlas.projects.earthengine.app/view/ecoviewer"
      title="EcoViewer — Global Ecosystems Reference Library"
      allowfullscreen
      loading="eager">
    </iframe>
  </div>

  <script src="../main.js"></script>
</body>
</html>
